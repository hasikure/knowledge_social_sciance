<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ジャンル別の習熟度</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<main class="shell">
  <nav class="topbar">
    <a href="../">トップ</a>
  </nav>
  <div class="card">
    <h1>ジャンル別の習熟度</h1>
    <div id="genre-list" style="margin-top:20px;"></div>
    <p class="fine-print">
      各ジャンルの問題を「未出題・1回正解・2回連続正解・1回間違えた・2回連続で間違えた」の
      5段階で見て、重みづけした平均を色の達成率(%)にしています。色の意味は以下の通りです。
    </p>
    <div class="tier-legend" id="tier-legend"></div>
  </div>
</main>

<script src="../assets/tier.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const GENRE_URL = {
    "sekai-isan": "../syakai/sekai-isan/",
    chimei: "../syakai/todofuken/",
    chikei: "../syakai/chikei/",
  };

  const res = await fetch("/api/dashboard");
  const data = await res.json();

  const list = document.getElementById("genre-list");
  data.genres.forEach((genre) => {
    const tier = TierScale.tierFor(genre.pct);

    const row = document.createElement("a");
    row.className = "genre-row";
    row.href = GENRE_URL[genre.key] || "#";

    const top = document.createElement("div");
    top.className = "genre-row-top";
    const name = document.createElement("span");
    name.className = "genre-row-name";
    name.textContent = genre.name;
    const caption = document.createElement("span");
    caption.className = "genre-row-caption";
    caption.textContent = `${Math.round(genre.pct)}%`;
    top.append(name, caption);

    const track = document.createElement("div");
    track.className = "meter-track genre-tier-track";
    const fill = document.createElement("div");
    fill.className = "meter-fill";
    fill.style.width = `${Math.max(genre.pct, 4)}%`;
    fill.style.background = tier.bg;
    track.appendChild(fill);

    row.append(top, track);
    list.appendChild(row);
  });

  TierScale.renderLegend(document.getElementById("tier-legend"));
});
</script>
</body>
</html>
