<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>先生用メニュー</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<main class="shell">
  <nav class="topbar">
    <a href="../">トップ</a>
  </nav>
  <div class="card" id="app">
    <h1>先生用メニュー</h1>
    <ul class="topic-list">
      <li><a href="stats/">統計・履歴を見る</a></li>
      <li><a href="questions/">問題を登録する</a></li>
    </ul>
  </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const res = await fetch("/api/me");
  const { role } = await res.json();
  if (role !== "teacher") {
    document.getElementById("app").innerHTML =
      '<h1>先生用メニュー</h1><p class="empty-note">このページは先生アカウントでログインした場合のみ利用できます。</p>';
  }
});
</script>
</body>
</html>
