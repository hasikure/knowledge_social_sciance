<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>知識クイズ</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<main class="shell">
  <div class="card">
    <h1>知識クイズ</h1>

    <div class="kpi-row">
      <div class="stat-tile">
        <p class="stat-label">レベル</p>
        <p class="stat-value">Lv. <span id="stat-level">1</span> <span class="tier-badge" id="tier-badge"></span></p>
      </div>
      <div class="stat-tile">
        <p class="stat-label">総合スコア</p>
        <p class="stat-value" id="stat-score">0<span class="stat-unit">/ 0</span></p>
      </div>
      <div class="stat-tile">
        <p class="stat-label">連続プレイ日数</p>
        <p class="stat-value" id="stat-streak">0<span class="stat-unit">日</span></p>
      </div>
    </div>

    <section class="subject-section">
      <h2>理科</h2>
      <div id="rika-quiz-list"></div>
    </section>

    <section class="subject-section">
      <h2>社会</h2>
      <div id="syakai-quiz-list"></div>
    </section>

    <section class="subject-section">
      <h2>ジャンル別の習熟度</h2>
      <div id="genre-list"></div>
      <p class="genre-link"><a href="genres/">くわしく見る →</a></p>
    </section>
  </div>
</main>

<script src="assets/dashboard-stats.js"></script>
<script src="assets/item-stats.js"></script>
<script src="assets/tier.js"></script>
<script src="assets/genre-stats.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  // "都道府県"「県庁所在地」は地方別の練習モードも持つが、ダッシュボード上の
  // スコアは「全国」スコープの自己ベストだけを使う(地方別スコアまで合算すると
  // 同じ県が何重にもカウントされてしまうため)。
  const QUIZZES = {
    rika: [],
    syakai: [
      { name: "日本の世界遺産", url: "syakai/sekai-isan/", key: "chishikiQuiz:sekai-isan:bestScore", max: 26 },
      { name: "日本の都道府県", url: "syakai/todofuken/", key: "chishikiQuiz:todofuken:all:bestScore", max: 47 },
      { name: "県庁所在地", url: "syakai/kencho/", key: "chishikiQuiz:kencho:all:bestScore", max: 47 },
      { name: "日本の地形", url: "syakai/chikei/", key: "chishikiQuiz:chikei:bestScore", max: 25 },
    ],
  };

  function bestOf(quiz) {
    return Number(localStorage.getItem(quiz.key) || 0);
  }

  function renderQuizList(container, quizzes) {
    if (quizzes.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "準備中です。";
      container.appendChild(p);
      return;
    }
    quizzes.forEach((quiz) => {
      const best = bestOf(quiz);
      const pct = Math.min(100, Math.round((best / quiz.max) * 100));

      const card = document.createElement("a");
      card.className = "quiz-card";
      card.href = quiz.url;

      const top = document.createElement("div");
      top.className = "quiz-card-top";
      const name = document.createElement("span");
      name.className = "quiz-card-name";
      name.textContent = quiz.name;
      const score = document.createElement("span");
      score.className = "quiz-card-score";
      score.textContent = best > 0 ? `${best} / ${quiz.max}` : "未挑戦";
      top.append(name, score);

      const track = document.createElement("div");
      track.className = "meter-track";
      const fill = document.createElement("div");
      fill.className = "meter-fill" + (pct >= 100 ? " is-complete" : "");
      fill.style.width = `${pct}%`;
      track.appendChild(fill);

      card.append(top, track);
      container.appendChild(card);
    });
  }

  renderQuizList(document.getElementById("rika-quiz-list"), QUIZZES.rika);
  renderQuizList(document.getElementById("syakai-quiz-list"), QUIZZES.syakai);
  GenreStats.renderGenreRows(document.getElementById("genre-list"), "");

  const allQuizzes = [...QUIZZES.rika, ...QUIZZES.syakai];
  const totalMax = allQuizzes.reduce((sum, q) => sum + q.max, 0);
  const totalScore = allQuizzes.reduce((sum, q) => sum + bestOf(q), 0);
  const pct = totalMax > 0 ? (totalScore / totalMax) * 100 : 0;
  const level = totalMax > 0 ? Math.min(10, Math.floor((pct / 100) * 10) + 1) : 1;
  const tier = TierScale.tierFor(pct);

  document.getElementById("stat-level").textContent = level;
  document.getElementById("stat-score").innerHTML = `${totalScore}<span class="stat-unit">/ ${totalMax}</span>`;
  document.getElementById("stat-streak").innerHTML = `${DashboardStats.getStreak()}<span class="stat-unit">日 🔥</span>`;

  const tierBadge = document.getElementById("tier-badge");
  tierBadge.textContent = tier.name;
  tierBadge.style.background = tier.bg;
  tierBadge.style.color = tier.fg;
});
</script>
</body>
</html>
