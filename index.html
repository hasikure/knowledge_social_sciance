<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>知識クイズ</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<main class="shell">
  <div class="card">
    <h1>知識クイズ</h1>

    <div class="kpi-row">
      <div class="stat-tile">
        <p class="stat-label">レベル</p>
        <p class="stat-value">Lv. <span id="stat-level">1</span></p>
        <div class="meter-track level-meter">
          <div class="meter-fill" id="level-meter-fill"></div>
        </div>
        <p class="stat-unit" id="level-caption"></p>
      </div>
      <div class="stat-tile">
        <p class="stat-label">連続プレイ日数</p>
        <p class="stat-value" id="stat-streak">0<span class="stat-unit">日</span></p>
      </div>
      <div class="stat-tile">
        <p class="stat-label">総合スコア</p>
        <p class="stat-value"><span class="score-dot" id="score-dot"></span><span id="stat-score">0</span><span class="stat-unit" id="stat-score-max">/ 0</span></p>
      </div>
    </div>

    <section class="subject-section">
      <div class="section-header">
        <h2>演習</h2>
        <a href="genres/">詳細 →</a>
      </div>
      <div class="genre-grid" id="genre-grid"></div>
    </section>

    <section class="subject-section">
      <h2>進捗</h2>
      <div id="task-list"></div>
    </section>

    <p class="fine-print" id="teacher-link" hidden style="text-align:right;">
      <a href="teacher/">先生用メニュー →</a>
    </p>
  </div>
</main>

<script src="assets/tier.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const WEEKLY_TARGET = 7; // 週に1日1回ペースのイメージ

  const [res, meRes] = await Promise.all([fetch("/api/dashboard"), fetch("/api/me")]);
  const data = await res.json();
  const me = await meRes.json();
  if (me.role === "teacher") {
    document.getElementById("teacher-link").hidden = false;
  }

  const pct = data.totalMax > 0 ? (data.totalScore / data.totalMax) * 100 : 0;
  const tier = TierScale.tierFor(pct);
  const { level, total: xpTotal, base: xpBase, next: xpNext } = data.xp;

  document.getElementById("stat-level").textContent = level;
  document.getElementById("stat-streak").innerHTML = `${data.streak}<span class="stat-unit">日 🔥</span>`;
  document.getElementById("stat-score").textContent = data.totalScore;
  document.getElementById("stat-score-max").textContent = `/ ${data.totalMax}`;
  document.getElementById("score-dot").style.background = tier.bg;

  const withinLevelPct = xpNext === null ? 100 : Math.min(100, ((xpTotal - xpBase) / (xpNext - xpBase)) * 100);
  document.getElementById("level-meter-fill").style.width = `${withinLevelPct}%`;
  document.getElementById("level-caption").textContent =
    xpNext === null ? "MAX" : `次のレベルまで あと${Math.max(0, xpNext - xpTotal)}XP`;

  const genreGrid = document.getElementById("genre-grid");
  const GENRE_URL = {
    "sekai-isan": "syakai/sekai-isan/",
    chimei: "syakai/todofuken/",
    chikei: "syakai/chikei/",
  };
  data.genres.forEach((genre) => {
    const genreTier = TierScale.tierFor(genre.pct);
    const card = document.createElement("a");
    card.className = "genre-card";
    card.href = GENRE_URL[genre.key] || "#";

    const dot = document.createElement("span");
    dot.className = "genre-card-dot";
    dot.style.background = genreTier.bg;

    const name = document.createElement("span");
    name.className = "genre-card-name";
    name.textContent = genre.name;

    card.append(dot, name);
    genreGrid.appendChild(card);
  });

  // 進捗: 今週(月曜リセット)の演習ラウンド数チェックリスト。
  const weeklyCount = Math.min(WEEKLY_TARGET, data.weeklyCount);

  const taskList = document.getElementById("task-list");
  const item = document.createElement("div");
  item.className = "task-item";
  const top = document.createElement("div");
  top.className = "task-item-top";
  const name = document.createElement("span");
  name.className = "task-item-name";
  name.textContent = "1. 演習に取り組む";
  const count = document.createElement("span");
  count.className = "task-item-count";
  count.textContent = `${weeklyCount} / ${WEEKLY_TARGET}`;
  top.append(name, count);

  const track = document.createElement("div");
  track.className = "meter-track";
  const fill = document.createElement("div");
  fill.className = "meter-fill" + (weeklyCount >= WEEKLY_TARGET ? " is-complete" : "");
  fill.style.width = `${(weeklyCount / WEEKLY_TARGET) * 100}%`;
  track.appendChild(fill);

  item.append(top, track);
  taskList.appendChild(item);
});
</script>
</body>
</html>
