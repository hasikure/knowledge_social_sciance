<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本の世界遺産クイズ</title>
  <link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
<main class="shell">
  <nav class="topbar">
    <a href="../../">トップ</a>
    <a href="../">社会</a>
  </nav>
  <div class="card" id="quiz-app"></div>
</main>

<script src="../../assets/quiz.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const { shuffle, pickDistractors } = ChishikiQuiz;

  const questionTypes = [
    {
      // 説明 → 名称
      build(item, all) {
        const distractors = pickDistractors(all.map((i) => i.label), [item.label], 3);
        const choices = shuffle([item.label, ...distractors]);
        return {
          prompt: `次の説明にあてはまる世界遺産は？\n「${item.extra.hint}」`,
          choices,
          correctIndex: choices.indexOf(item.label),
        };
      },
    },
    {
      // 名称 → 所在都道府県
      build(item, all) {
        const pool = all.flatMap((i) => i.extra.prefectures);
        const distractors = pickDistractors(pool, item.extra.prefectures, 3);
        const correctPref = item.extra.prefectures[0];
        const choices = shuffle([correctPref, ...distractors]);
        return {
          prompt: `「${item.label}」の主な所在都道府県は？`,
          choices,
          correctIndex: choices.indexOf(correctPref),
        };
      },
    },
    {
      // 名称 → 文化遺産/自然遺産
      build(item) {
        const choices = shuffle(["文化遺産", "自然遺産"]);
        return {
          prompt: `「${item.label}」は文化遺産・自然遺産のどちらに分類される？`,
          choices,
          correctIndex: choices.indexOf(item.category),
        };
      },
    },
  ];

  ChishikiQuiz.run({
    mountId: "quiz-app",
    quizId: "sekai-isan",
    title: "日本の世界遺産クイズ",
    questionTypes,
  });
});
</script>
</body>
</html>
