<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本の地形クイズ</title>
  <link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
<main class="shell">
  <nav class="topbar">
    <a href="../../">トップ</a>
    <a href="../">社会</a>
  </nav>
  <div class="card" id="quiz-app"></div>
</main>

<script src="../../assets/quiz.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const { shuffle, pickDistractors } = ChishikiQuiz;
  const CATEGORIES = ["山地・山脈", "平野", "川", "湖", "海流", "半島", "海峡"];

  const questionTypes = [
    {
      // 説明 → 名称
      build(item, all) {
        const distractors = pickDistractors(all.map((i) => i.label), [item.label], 3);
        const choices = shuffle([item.label, ...distractors]);
        return {
          prompt: `次の説明にあてはまる地形は？\n「${item.extra.hint}」`,
          choices,
          correctIndex: choices.indexOf(item.label),
        };
      },
    },
    {
      // 名称 → 分類
      build(item) {
        const distractors = pickDistractors(CATEGORIES, [item.category], 3);
        const choices = shuffle([item.category, ...distractors]);
        return {
          prompt: `「${item.label}」は次のどれに分類される？`,
          choices,
          correctIndex: choices.indexOf(item.category),
        };
      },
    },
  ];

  ChishikiQuiz.run({
    mountId: "quiz-app",
    quizId: "chikei",
    title: "日本の地形クイズ",
    questionTypes,
  });
});
</script>
</body>
</html>
