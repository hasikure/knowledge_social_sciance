<script src="../../assets/dashboard-stats.js"></script>
<script src="../../assets/item-stats.js"></script>
<script src="../../assets/quiz.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const items = JSON.parse(document.getElementById("chikei-data").textContent);
  const { shuffle, pickDistractors } = ChishikiQuiz;
  const CATEGORIES = ["山地・山脈", "平野", "川", "湖", "海流", "半島", "海峡"];

  const questionTypes = [
    {
      // 説明 → 名称
      build(item, all) {
        const distractors = pickDistractors(all.map((i) => i.name), [item.name], 3);
        const choices = shuffle([item.name, ...distractors]);
        return {
          prompt: `次の説明にあてはまる地形は？\n「${item.hint}」`,
          choices,
          correctIndex: choices.indexOf(item.name),
        };
      },
    },
    {
      // 名称 → 分類
      build(item) {
        const distractors = pickDistractors(CATEGORIES, [item.category], 3);
        const choices = shuffle([item.category, ...distractors]);
        return {
          prompt: `「${item.name}」は次のどれに分類される？`,
          choices,
          correctIndex: choices.indexOf(item.category),
        };
      },
    },
  ];

  ChishikiQuiz.run({
    mountId: "quiz-app",
    quizId: "chikei",
    title: "日本の地形クイズ",
    items,
    questionTypes,
  });
});
</script>
</body>
</html>
