<script src="../assets/quiz.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const items = JSON.parse(document.getElementById("heritage-data").textContent);
  const { shuffle, pickDistractors } = ChishikiQuiz;

  const questionTypes = [
    {
      // 説明 → 名称
      build(item, all) {
        const distractors = pickDistractors(all.map((i) => i.name), [item.name], 3);
        const choices = shuffle([item.name, ...distractors]);
        return {
          prompt: `次の説明にあてはまる世界遺産は？\n「${item.hint}」`,
          choices,
          correctIndex: choices.indexOf(item.name),
        };
      },
    },
    {
      // 名称 → 所在都道府県
      build(item, all) {
        const pool = all.flatMap((i) => i.prefectures);
        const distractors = pickDistractors(pool, item.prefectures, 3);
        const correctPref = item.prefectures[0];
        const choices = shuffle([correctPref, ...distractors]);
        return {
          prompt: `「${item.name}」の主な所在都道府県は？`,
          choices,
          correctIndex: choices.indexOf(correctPref),
        };
      },
    },
    {
      // 名称 → 文化遺産/自然遺産
      build(item) {
        const choices = shuffle(["文化遺産", "自然遺産"]);
        return {
          prompt: `「${item.name}」は文化遺産・自然遺産のどちらに分類される？`,
          choices,
          correctIndex: choices.indexOf(item.type),
        };
      },
    },
  ];

  ChishikiQuiz.run({
    mountId: "quiz-app",
    quizId: "sekai-isan",
    title: "日本の世界遺産クイズ",
    items,
    questionTypes,
  });
});
</script>
